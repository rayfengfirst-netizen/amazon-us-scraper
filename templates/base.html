<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Amazon 采集{% endblock %}</title>
  <style>
    :root {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      color: #0f1111;
      --bg: #f8f9fa;
      --surface: #ffffff;
      --border: #d5d9d9;
      --border-light: #e3e6e6;
      --text-muted: #565959;
      --accent: #c45500;
      --link: #007185;
      --radius: 12px;
      --shadow: 0 2px 8px rgba(15, 17, 17, 0.08);
      --shadow-hover: 0 4px 16px rgba(15, 17, 17, 0.12);
    }
    body { background: var(--bg); margin: 0; min-height: 100vh; }
    .shell { max-width: 1100px; margin: 0 auto; padding: 1rem 1.25rem 3rem; }
    a { color: var(--link); text-decoration: none; }
    a:hover { text-decoration: underline; color: #c7511f; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th, td { text-align: left; padding: 0.5rem 0.6rem; border-bottom: 1px solid #e5e5e5; }
    th { font-size: 0.85rem; color: #555; }
    .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.8rem; }
    .pending { background: #fff3cd; }
    .running { background: #cfe2ff; }
    .success { background: #d1e7dd; }
    .failed { background: #f8d7da; }
    .cache { background: #e7e7ff; }
    .api { background: #e2f0ff; }
    .err { color: #b00020; margin: 0.5rem 0; }
    input[type=text] { width: min(100%, 42rem); padding: 0.45rem 0.6rem; }
    button, .btn { padding: 0.4rem 0.75rem; cursor: pointer; }
    pre.json { background: #f6f8fa; padding: 1rem; overflow: auto; max-height: 70vh; font-size: 0.85rem; }
    .muted { color: #666; font-size: 0.9rem; }
    nav { margin-bottom: 1rem; font-size: 0.9rem; }
    nav a { color: var(--text-muted); }
    nav a:hover { color: var(--link); }
    .small { font-size: 0.85rem; }
    .btn-row { display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center; margin: 0.75rem 0; }
    .force-form { display: inline; }
    button.secondary { background: #f0f0f0; border: 1px solid #ccc; }
    .section-title { font-size: 1.05rem; margin: 0 0 0.75rem; border-bottom: 1px solid #eee; padding-bottom: 0.35rem; }
    .card { background: #fafafa; border: 1px solid #eaeaea; border-radius: 8px; padding: 1rem 1.1rem; margin: 1.25rem 0; }
    dl.kv { display: grid; grid-template-columns: 8rem 1fr; gap: 0.35rem 1rem; margin: 0; font-size: 0.95rem; }
    dl.kv dt { color: #666; margin: 0; }
    dl.kv dd { margin: 0; word-break: break-word; }
    ul.bullets { margin: 0; padding-left: 1.2rem; }
    ul.bullets li { margin: 0.35rem 0; }
    ul.plain { margin: 0.25rem 0; padding-left: 1.2rem; }
    .img-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.75rem; }
    .img-grid a { display: block; border: 1px solid #e5e5e5; border-radius: 6px; overflow: hidden; background: #fff; }
    .img-grid img { width: 100%; height: 160px; object-fit: contain; display: block; }
    details summary { cursor: pointer; color: var(--link); margin-bottom: 0.5rem; }

    /* —— 商品详情页（电商布局）—— */
    .page-product .breadcrumb { font-size: 0.8125rem; color: var(--text-muted); margin-bottom: 1rem; }
    .page-product .breadcrumb span { margin: 0 0.35rem; color: var(--border); }
    .page-product .dev-toolbar {
      display: flex; flex-wrap: wrap; align-items: center; gap: 0.5rem 1rem;
      padding: 0.65rem 1rem; background: var(--surface); border: 1px solid var(--border-light);
      border-radius: var(--radius); margin-bottom: 1.25rem; box-shadow: var(--shadow);
    }
    .page-product .dev-toolbar .actions { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-left: auto; }
    .page-product .dev-toolbar button, .page-product .dev-toolbar .btn {
      padding: 0.45rem 0.9rem; border-radius: 8px; border: 1px solid var(--border);
      background: #ffd814; font-weight: 600; font-size: 0.875rem; color: #0f1111;
    }
    .page-product .dev-toolbar button.secondary { background: var(--surface); font-weight: 500; }
    .page-product .dev-toolbar .hint { flex-basis: 100%; font-size: 0.75rem; color: var(--text-muted); margin: 0; }

    .page-product .product-shell {
      background: var(--surface); border: 1px solid var(--border-light); border-radius: var(--radius);
      padding: 1.5rem 1.5rem 2rem; box-shadow: var(--shadow); margin-bottom: 1.5rem;
    }
    .page-product .product-layout {
      display: grid; grid-template-columns: 1fr; gap: 1.75rem;
    }
    @media (min-width: 880px) {
      .page-product .product-layout { grid-template-columns: minmax(280px, 42%) 1fr; gap: 2rem; align-items: start; }
    }

    .page-product .product-gallery__main {
      aspect-ratio: 1; max-height: 480px; background: #fff; border: 1px solid var(--border-light);
      border-radius: var(--radius); display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .page-product .product-gallery__main img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .page-product .product-gallery__placeholder {
      color: var(--text-muted); font-size: 0.9rem; text-align: center; padding: 2rem;
    }
    .page-product .product-gallery__thumbs {
      display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.75rem;
    }
    .page-product .product-gallery__thumbs button.thumb {
      width: 56px; height: 56px; padding: 0; border: 2px solid transparent; border-radius: 8px;
      cursor: pointer; overflow: hidden; background: #fff; flex-shrink: 0;
    }
    .page-product .product-gallery__thumbs button.thumb img { width: 100%; height: 100%; object-fit: cover; }
    .page-product .product-gallery__thumbs button.thumb:hover { border-color: var(--border); }
    .page-product .product-gallery__thumbs button.thumb.is-active { border-color: #e77600; box-shadow: 0 0 0 1px #e77600; }

    .page-product .buybox-brand { font-size: 0.875rem; color: var(--link); margin-bottom: 0.25rem; }
    .page-product .buybox-title { font-size: clamp(1.25rem, 2.5vw, 1.65rem); font-weight: 400; line-height: 1.35; margin: 0 0 0.75rem; color: #0f1111; }
    .page-product .buybox-asin { font-size: 0.8125rem; color: var(--text-muted); margin-bottom: 1rem; }
    .page-product .buybox-asin code { background: var(--bg); padding: 0.15rem 0.4rem; border-radius: 4px; font-size: 0.8rem; }

    .page-product .rating-line { display: flex; flex-wrap: wrap; align-items: center; gap: 0.5rem 1rem; margin-bottom: 1rem; font-size: 0.9rem; }
    .page-product .rating-line .stars { color: #de7921; letter-spacing: 1px; font-size: 1.1rem; line-height: 1; }
    .page-product .rating-line .rating-num { font-weight: 600; }
    .page-product .rating-line .review-hint { color: var(--link); }

    .page-product .price-block { margin-bottom: 1.25rem; padding-bottom: 1.25rem; border-bottom: 1px solid var(--border-light); }
    .page-product .price-block .price-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
    .page-product .price-block .price-value { font-size: 1.75rem; font-weight: 400; color: #0f1111; margin-top: 0.15rem; }
    .page-product .price-block .price-missing { color: var(--text-muted); font-size: 1rem; }

    .page-product .panel { border: 1px solid var(--border-light); border-radius: var(--radius); margin-top: 1.25rem; overflow: hidden; }
    .page-product .panel-hd { background: linear-gradient(180deg, #f0f2f2 0%, #e7e9e9 100%); padding: 0.65rem 1rem; font-weight: 600; font-size: 0.95rem; border-bottom: 1px solid var(--border-light); }
    .page-product .panel-bd { padding: 1rem 1.1rem; background: var(--surface); }
    .page-product ul.feature-list { margin: 0; padding-left: 0; list-style: none; }
    .page-product ul.feature-list li {
      position: relative; padding-left: 1.35rem; margin: 0.55rem 0; font-size: 0.9rem; line-height: 1.45;
    }
    .page-product ul.feature-list li::before {
      content: "✓"; position: absolute; left: 0; color: #067d62; font-weight: 700; font-size: 0.85rem;
    }

    .page-product table.spec-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    .page-product table.spec-table th, .page-product table.spec-table td {
      padding: 0.55rem 0.75rem; text-align: left; border-bottom: 1px solid var(--border-light); vertical-align: top;
    }
    .page-product table.spec-table th { width: 32%; color: var(--text-muted); font-weight: 500; background: #f7f8f8; }
    .page-product table.spec-table tr:last-child th, .page-product table.spec-table tr:last-child td { border-bottom: none; }
    .page-product table.spec-table code { font-size: 0.78rem; word-break: break-all; }

    .page-product .meta-accordion { margin-top: 1rem; }
    .page-product .meta-accordion details { border: 1px solid var(--border-light); border-radius: 8px; padding: 0.5rem 0.85rem; background: #fafafa; margin-top: 0.5rem; }
    .page-product .alert-running { padding: 1rem; background: #e7f1ff; border-radius: var(--radius); border: 1px solid #b4d4ff; }
    .page-product .alert-err { padding: 1rem; background: #fdecea; border-radius: var(--radius); border: 1px solid #f5c6cb; color: #721c24; }

    /* 列表页 */
    .page-list h1 { font-size: 1.5rem; font-weight: 600; margin: 0 0 0.5rem; }
    .page-list .list-card {
      background: var(--surface); border: 1px solid var(--border-light); border-radius: var(--radius);
      padding: 1.25rem 1.35rem; box-shadow: var(--shadow); margin-top: 1rem;
    }
    .page-list table { margin-top: 0; }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
  <div class="shell">
  <nav>{% block nav %}<a href="/">← 返回采集列表</a>{% endblock %}</nav>
  {% block body %}{% endblock %}
  </div>
</body>
</html>
